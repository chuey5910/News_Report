name: Daily News Report

# ไม่ใช้ schedule cron ของ GitHub แล้ว — พบว่าดีเลย์หนักและยิงเวลามั่ว (เช่น 14:31, 19:56,
# 22:09 น.) ทำให้แจ้งเตือน LINE นอกเวลา และ "ตัดหน้า" ข่าวของรอบ 07:05/16:05 น. จนรอบจริง
# ไม่มีข่าวใหม่เหลือ — ตอนนี้การรันตามเวลา (07:05 และ 16:05 น. ไทย) ถูกสั่งจากระบบ Routines
# ของ Claude ผ่าน workflow_dispatch แทน
on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily report
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
        run: python -m news_report.main

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily news report $(date -u +%F)"
            git push
          fi
