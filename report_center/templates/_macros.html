{% macro render_field(field, full=False, half=False) %}
  <div class="form-field{{ ' full' if full else '' }}{{ ' half' if half else '' }}">
    {{ field.label }}
    {{ field(data_label=field.label.text, **kwargs) }}
    {% if field.errors %}
      {% for error in field.errors %}
        <div class="field-error">{{ error }}</div>
      {% endfor %}
    {% endif %}
  </div>
{% endmacro %}
