<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สรุปข่าวรายวัน - 17 จังหวัดภาคเหนือ</title>
<style>
  body { font-family: "Sarabun", "Noto Sans Thai", sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; color: #1a1a1a; }
  h1 { font-size: 1.6rem; }
  ul { list-style: none; padding: 0; }
  li { padding: .6rem 0; border-bottom: 1px solid #eee; }
  a { color: #0b5fff; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
  <h1>สรุปข่าวรายวัน &mdash; 17 จังหวัดภาคเหนือ/เหนือตอนล่าง</h1>
  {% if not reports %}
    <p>ยังไม่มีรายงาน</p>
  {% endif %}
  <ul>
    {% for report in reports %}
      <li><a href="reports/{{ report.date }}.html">{{ report.date }}</a></li>
    {% endfor %}
  </ul>
</body>
</html>
